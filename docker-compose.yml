version: "3.9"

services:
  stripe-mock:
    image: stripemock/stripe-mock:latest
    container_name: integration-stripe-mock
    ports:
      - "12111:12111"
      - "12112:12112"
    healthcheck:
      # stripe-mock requires bearer auth; any sk_test_* string is accepted.
      # Without the header it returns HTTP 401 and the probe never succeeds.
      test: ["CMD", "wget", "-qO-", "--header=Authorization: Bearer sk_test_compose", "http://localhost:12111/v1/charges?limit=1"]
      interval: 5s
      timeout: 3s
      retries: 5

  adapter:
    build:
      context: .
    container_name: integration-stripe-adapter
    depends_on:
      stripe-mock:
        condition: service_healthy
    environment:
      ADAPTER_PORT: "8081"
      WEBHOOK_PORT: "8082"
      HEALTHCHECK_PORT: "8080"
      STRIPE_API_BASE: "http://stripe-mock:12111"
      STRIPE_API_KEY: "sk_test_compose"
      YGGDRASIL_TRANSPORT: "http"
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
