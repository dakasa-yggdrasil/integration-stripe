apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: ensure-payment-intent
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: ensure_payment_intent
  description: |
    Ensure a Stripe PaymentIntent exists in the desired state. Collapses
    create + confirm into a single canonical operation: when payment_intent_id
    is supplied, the call follows the confirm path; otherwise creates a new
    intent (with confirm=true accepted as a shorthand for create-then-confirm).
    Forwards Stripe Idempotency-Key derived from input or sha256(amount+currency+customer).
  inputs:
    payment_intent_id:
      type: string
      description: When set, follows the confirm path on the existing intent.
    amount:
      type: integer
    currency:
      type: string
      description: ISO 4217 lowercase ("brl", "usd").
    customer:
      type: string
    payment_method:
      type: string
    payment_method_types:
      type: array
      items: { type: string }
      default: ["card"]
    capture_method:
      type: string
      default: automatic
    confirm:
      type: boolean
      default: false
    setup_future_usage:
      type: string
    return_url:
      type: string
    metadata:
      type: object
    stripe_account:
      type: string
    idempotency_key:
      type: string
  outputs:
    payment_intent_id: { type: string }
    client_secret: { type: string }
    status: { type: string }
    amount: { type: integer }
    currency: { type: string }
    next_action: { type: object }
