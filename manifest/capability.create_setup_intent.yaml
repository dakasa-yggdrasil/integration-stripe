apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: create-setup-intent
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: create_setup_intent
  description: |
    Create a SetupIntent to save a payment method for future use.
  inputs:
    customer: { type: string }
    payment_method: { type: string }
    payment_method_types:
      type: array
      items: { type: string }
      default: ["card"]
    usage: { type: string, default: off_session }
    metadata: { type: object }
    stripe_account: { type: string }
    idempotency_key: { type: string }
  outputs:
    setup_intent_id: { type: string }
    client_secret: { type: string }
    status: { type: string }
