apiVersion: yggdrasil.io/v1alpha1
kind: integration_type
metadata:
  name: stripe
  namespace: global
spec:
  provider: stripe
  version: 2.0.0
  adapter:
    image_repo: ghcr.io/dakasa-yggdrasil/integration-stripe
    image_tag: v2.0.0
    transport: http_json
    endpoints:
      describe: /rpc/describe
      execute: /rpc/execute
    timeout_seconds: 30
  capabilities:
    - describe
    - execute
  credential_schema:
    mode: env
    required: [STRIPE_API_KEY, STRIPE_WEBHOOK_SECRET]
  action_catalog:
    # payment_intent triple
    - name: ensure_payment_intent
      category: capability
      idempotent: true
      resource_types: [payment_intent]
    - name: observe_payment_intents
      category: capability
      idempotent: true
      resource_types: [payment_intent]
    - name: destroy_payment_intent
      category: capability
      idempotent: true
      resource_types: [payment_intent]
    # customer triple
    - name: ensure_customer
      category: capability
      idempotent: true
      resource_types: [customer]
    - name: observe_customers
      category: capability
      idempotent: true
      resource_types: [customer]
    - name: destroy_customer
      category: capability
      idempotent: true
      resource_types: [customer]
    # subscription triple
    - name: ensure_subscription
      category: capability
      idempotent: true
      resource_types: [subscription]
    - name: observe_subscriptions
      category: capability
      idempotent: true
      resource_types: [subscription]
    - name: destroy_subscription
      category: capability
      idempotent: true
      resource_types: [subscription]
    # charge (read-only) + refund (money-movement, allowlisted)
    - name: observe_charges
      category: capability
      idempotent: true
      resource_types: [charge]
    - name: create_refund
      category: capability
      idempotent: true
      resource_types: [refund]
    # balance (read-only singleton)
    - name: observe_balance
      category: capability
      idempotent: true
      resource_types: [balance]
    # webhook_endpoint triple
    - name: ensure_webhook_endpoint
      category: capability
      idempotent: true
      resource_types: [webhook_endpoint]
    - name: observe_webhook_endpoints
      category: capability
      idempotent: true
      resource_types: [webhook_endpoint]
    - name: destroy_webhook_endpoint
      category: capability
      idempotent: true
      resource_types: [webhook_endpoint]
    # Allowlisted action helpers (kept verbatim from v1.x)
    - name: create_setup_intent
      category: capability
      idempotent: true
      resource_types: [setup_intent]
    - name: create_payout
      category: capability
      idempotent: true
      resource_types: [payout]
    - name: manage_connect_account
      category: capability
      idempotent: true
      resource_types: [connect_account]
    - name: verify_webhook_signature
      category: capability
      idempotent: true
      resource_types: [webhook_endpoint]
    # Reactor
    - name: stripe_webhook_received
      category: reactor
      idempotent: true
      resource_types: [webhook_endpoint]
