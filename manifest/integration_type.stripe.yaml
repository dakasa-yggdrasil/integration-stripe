apiVersion: yggdrasil.io/v1alpha1
kind: integration_type
metadata:
  name: stripe
  namespace: global
spec:
  provider: stripe
  # INTEGRATION_CONTRACT §17 — adapter self-declares its purpose.
  # Stripe is money movement (subscriptions, payments, refunds, payouts).
  domain: payments
  # Provider-side management UI. Surfaces render an "Abrir Stripe" CTA.
  dashboard:
    url: https://dashboard.stripe.com
    label: "Abrir Stripe"
  version: 2.2.4
  adapter:
    image_repo: ghcr.io/dakasa-yggdrasil/integration-stripe
    image_tag: v2.2.4
    transport: http_json
    endpoints:
      describe: /rpc/describe
      execute: /rpc/execute
    timeout_seconds: 30
    version: 2.2.4
  capabilities:
  - describe
  - execute
  credential_schema:
    mode: inline
    # stripe_secret_key is declared as an accepted alias for
    # stripe_api_key — operator AWS Secrets Manager (and equivalent
    # secret-store) entries that follow that naming convention work
    # WITHOUT renaming the secret. yggdrasil-core validates incoming
    # instance configs against this exact schema; the adapter-level
    # alias logic in adapter.Execute (v2.2.2) cannot bypass core's
    # field validator. At least one of stripe_api_key /
    # stripe_secret_key must be supplied; the canonical name wins
    # when both are present.
    properties:
      stripe_api_key:
        type: string
        secret: true
      stripe_secret_key:
        type: string
        secret: true
      stripe_webhook_secret:
        type: string
        secret: true
  action_catalog:
  - name: ensure_payment_intent
    category: capability
    idempotent: true
    resource_types:
    - payment_intent
  - name: observe_payment_intents
    category: capability
    idempotent: true
    resource_types:
    - payment_intent
  - name: destroy_payment_intent
    category: capability
    idempotent: true
    resource_types:
    - payment_intent
  - name: ensure_customer
    category: capability
    idempotent: true
    resource_types:
    - customer
  - name: observe_customers
    category: capability
    idempotent: true
    resource_types:
    - customer
  - name: destroy_customer
    category: capability
    idempotent: true
    resource_types:
    - customer
  - name: ensure_subscription
    category: capability
    idempotent: true
    resource_types:
    - subscription
  - name: observe_subscriptions
    category: capability
    idempotent: true
    resource_types:
    - subscription
  - name: destroy_subscription
    category: capability
    idempotent: true
    resource_types:
    - subscription
  - name: observe_charges
    category: capability
    idempotent: true
    resource_types:
    - charge
  - name: create_refund
    category: capability
    idempotent: true
    resource_types:
    - refund
  - name: observe_balance
    category: capability
    idempotent: true
    resource_types:
    - balance
  - name: ensure_webhook_endpoint
    category: capability
    idempotent: true
    resource_types:
    - webhook_endpoint
  - name: observe_webhook_endpoints
    category: capability
    idempotent: true
    resource_types:
    - webhook_endpoint
  - name: destroy_webhook_endpoint
    category: capability
    idempotent: true
    resource_types:
    - webhook_endpoint
  - name: create_setup_intent
    category: capability
    idempotent: true
    resource_types:
    - setup_intent
  - name: create_payout
    category: capability
    idempotent: true
    resource_types:
    - payout
  - name: manage_connect_account
    category: capability
    idempotent: true
    resource_types:
    - connect_account
  - name: verify_webhook_signature
    category: capability
    idempotent: true
    resource_types:
    - webhook_endpoint
  - name: stripe_webhook_received
    category: reactor
    idempotent: true
    resource_types:
    - webhook_endpoint
  resource_types:
  - name: payment_intent
    discoverable: false
    default_actions:
    - ensure_payment_intent
    - observe_payment_intents
    - destroy_payment_intent
    canonical_prefix: thirdparty.stripe.payment_intent
    identity_template: payment_intent.{id}
  - name: customer
    discoverable: false
    default_actions:
    - ensure_customer
    - observe_customers
    canonical_prefix: thirdparty.stripe.customer
    identity_template: customer.{id}
  - name: subscription
    discoverable: false
    default_actions:
    - ensure_subscription
    - observe_subscriptions
    - destroy_subscription
    canonical_prefix: thirdparty.stripe.subscription
    identity_template: subscription.{id}
  - name: charge
    discoverable: false
    default_actions:
    - observe_charges
    canonical_prefix: thirdparty.stripe.charge
    identity_template: charge.{id}
  - name: balance
    discoverable: false
    default_actions:
    - observe_balance
    canonical_prefix: thirdparty.stripe.balance
    identity_template: balance.{id}
  - name: webhook_endpoint
    discoverable: false
    default_actions:
    - ensure_webhook_endpoint
    - observe_webhook_endpoints
    - destroy_webhook_endpoint
    - verify_webhook_signature
    canonical_prefix: thirdparty.stripe.webhook_endpoint
    identity_template: webhook_endpoint.{id}
  - name: setup_intent
    discoverable: false
    default_actions:
    - create_setup_intent
    canonical_prefix: thirdparty.stripe.setup_intent
    identity_template: setup_intent.{id}
  - name: payout
    discoverable: false
    default_actions:
    - create_payout
    canonical_prefix: thirdparty.stripe.payout
    identity_template: payout.{id}
  - name: connect_account
    discoverable: false
    default_actions:
    - manage_connect_account
    canonical_prefix: thirdparty.stripe.connect_account
    identity_template: connect_account.{id}
  - name: refund
    discoverable: false
    default_actions:
    - create_refund
    canonical_prefix: thirdparty.stripe.refund
    identity_template: refund.{id}
  discovery:
    mode: push
    cursor: none
  normalization:
    name_path: metadata.name
    owner_path: metadata.namespace
    external_id_path: metadata.name
    fallback_resource_prefix: thirdparty.stripe.custom
  execution:
    supports_dry_run: false
    idempotent_actions:
    - ensure_payment_intent
    - observe_payment_intents
    - destroy_payment_intent
    - ensure_customer
    - observe_customers
    - destroy_customer
    - ensure_subscription
    - observe_subscriptions
    - destroy_subscription
    - observe_charges
    - create_refund
    - observe_balance
    - ensure_webhook_endpoint
    - observe_webhook_endpoints
    - destroy_webhook_endpoint
    - create_setup_intent
    - create_payout
    - manage_connect_account
    - verify_webhook_signature
    - stripe_webhook_received
  instance_schema:
    mode: inline
    properties:
      stripe_account_id:
        type: string
        description: Optional Stripe Connect account ID; sets Stripe-Account header.
      stripe_api_version:
        type: string
        default: 2024-12-18.acacia
      stripe_webhook_secret:
        type: string
        secret: true
        description: Stripe webhook endpoint signing secret (whsec_*).
      webhook_tolerance_seconds:
        type: integer
        default: 300
      # Operator-injected non-secret metadata accepted by the validation
      # instance. Declared so yggdrasil-core does not reject the config
      # at validation time. The adapter ignores fields it does not
      # consume; these stay out of the credential path.
      base_url:
        type: string
        description: Override RPC base URL for the adapter pod (used by the validation harness).
      environment:
        type: string
        description: Free-form environment tag (sandbox/production) for operator filtering.
      provider:
        type: string
        description: Provider-name echo (always "stripe"). Kept for instance ergonomics.
