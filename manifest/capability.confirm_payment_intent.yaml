apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: confirm-payment-intent
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: confirm_payment_intent
  description: |
    Confirm an existing PaymentIntent, triggering collection.
  inputs:
    payment_intent_id: { type: string, required: true }
    payment_method: { type: string }
    return_url: { type: string, description: "Required for redirect-based methods (3DS)." }
    stripe_account: { type: string }
    idempotency_key: { type: string }
  outputs:
    payment_intent_id: { type: string }
    status: { type: string }
    next_action: { type: object }
