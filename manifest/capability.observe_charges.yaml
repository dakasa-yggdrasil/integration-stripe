apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: observe-charges
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: observe_charges
  description: |
    Observe Stripe Charges filtered by customer or payment_intent. Read-only.
  inputs:
    customer: { type: string }
    payment_intent: { type: string }
    limit: { type: integer, default: 10 }
    starting_after: { type: string }
    stripe_account: { type: string }
  outputs:
    items: { type: array }
    has_more: { type: boolean }
