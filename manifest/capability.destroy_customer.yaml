apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: destroy-customer
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: destroy_customer
  description: |
    Destroy a Stripe Customer. DELETE /v1/customers/{id}. 404 → already-absent
    success.
  inputs:
    customer_id: { type: string }
    ref: { type: string, description: "SDK canonical Destroy alias for customer_id." }
    stripe_account: { type: string }
  outputs:
    customer_id: { type: string }
    deleted: { type: boolean }
