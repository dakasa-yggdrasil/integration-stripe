apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: destroy-payment-intent
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: destroy_payment_intent
  description: |
    Destroy (cancel) a Stripe PaymentIntent. POST /v1/payment_intents/{id}/cancel.
    404 → already-absent success.
  inputs:
    payment_intent_id: { type: string }
    ref: { type: string, description: "SDK canonical Destroy alias for payment_intent_id." }
    cancellation_reason:
      type: string
      enum: ["duplicate", "fraudulent", "requested_by_customer", "abandoned"]
    stripe_account: { type: string }
  outputs:
    payment_intent_id: { type: string }
    status: { type: string }
    cancellation_reason: { type: string }
