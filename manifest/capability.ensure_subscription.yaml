apiVersion: yggdrasil.io/v1alpha1
kind: capability
metadata:
  name: ensure-subscription
  namespace: global
spec:
  type_ref: { namespace: global, name: stripe }
  operation: ensure_subscription
  description: |
    Ensure a Stripe Subscription exists. When subscription_id is provided
    the call PATCHes the existing subscription; otherwise POST creates a
    new one. Defaults payment_behavior to default_incomplete (SCA-friendly).
  inputs:
    subscription_id: { type: string, description: "When set, follows the PATCH (update) path." }
    customer: { type: string }
    items:
      type: array
      items: { type: object }
    payment_behavior:
      type: string
      default: default_incomplete
    trial_end: { type: integer, description: "Unix timestamp." }
    cancel_at_period_end: { type: boolean }
    metadata: { type: object }
    stripe_account: { type: string }
    idempotency_key: { type: string }
  outputs:
    subscription_id: { type: string }
    status: { type: string }
    latest_invoice: { type: string }
    cancel_at_period_end: { type: boolean }
    canceled_at: { type: integer }
