events {}
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown path serves index.html so react-router
    # can take over. Static assets resolve via try_files first.
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Long-cache fingerprinted assets (Vite emits hashed filenames).
    location ~* \.(js|css|woff2?|svg|png|jpg|ico)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Plain liveness endpoint independent of the SPA bundle.
    location = /healthz {
      return 200 'ok';
      add_header Content-Type text/plain;
    }
  }
}
