name: release

# Publishes ghcr.io/dakasa-yggdrasil/integration-stripe.
#
# Build triggers (2026-05-27 harmonization — matches integration-efi):
#   - push to main           → builds branch-main-latest + sha-<short> + edge
#   - tag push (v*)          → builds v<version> + latest
#   - workflow_dispatch      → manual one-shot for hotfix sha rolls
#
# Previously this workflow only built on tag push, forcing every cycle
# to either bump a tag OR manually dispatch the workflow. The main-push
# trigger removes that friction so adapter rolls stay declarative.

on:
  push:
    branches:
      - main
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2.0.1 or sha-cf62857)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dakasa-yggdrasil/integration-stripe
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=edge,enable={{is_default_branch}}
            type=raw,value=branch-main-latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=integration-stripe
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
