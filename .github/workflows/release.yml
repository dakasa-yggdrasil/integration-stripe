name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dakasa-yggdrasil/integration-stripe:${{ github.ref_name }}
            ghcr.io/dakasa-yggdrasil/integration-stripe:latest
            ghcr.io/dakasa-yggdrasil/integration-stripe:sha-${{ github.sha }}
