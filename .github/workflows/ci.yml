name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      stripe-mock:
        image: stripemock/stripe-mock:latest
        ports:
          - 12111:12111
        options: >-
          --health-cmd="wget -qO- http://localhost:12111/v1/charges?limit=1 || exit 1"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      STRIPE_API_BASE: http://localhost:12111
      STRIPE_API_KEY: sk_test_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go mod download
      - run: go vet ./...
      - run: go test ./... -race -timeout 60s
      - run: go build ./cmd/adapter

  contractcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go test ./providers/stripe/adapter/ -run TestContractCheck -v
